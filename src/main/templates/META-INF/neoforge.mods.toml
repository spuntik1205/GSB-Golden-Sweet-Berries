modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/yourname/yourrepo/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="logo.png"
authors="You"
description='''
A simple mod that adds a Golden Berry to Minecraft.
'''

[[dependencies.${mod_id}]]
